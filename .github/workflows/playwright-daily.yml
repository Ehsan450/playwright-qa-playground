name: Daily Gold Stock Playwright Run

on:
  schedule:
    - cron: '30 4 * * *'   # 10:30 AM Bangladesh Time (UTC+6)
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      PROPOSER_EMAIL: ${{ secrets.PROPOSER_EMAIL }}
      PROPOSER_PASSWORD: ${{ secrets.PROPOSER_PASSWORD }}
      APPROVER_EMAIL: ${{ secrets.APPROVER_EMAIL }}
      APPROVER_PASSWORD: ${{ secrets.APPROVER_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test
